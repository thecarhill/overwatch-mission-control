# Portainer (stack desde Git): construye la imagen en el servidor — NO hace pull de GHCR.
# En Portainer → Compose path: docker-compose.build.yml
# Environment variables (stack): VITE_GITHUB_PAT, VITE_GITHUB_OWNER, VITE_GITHUB_REPO
# Opcional: VITE_GITHUB_BRANCH (default main)

services:
  overwatch:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_GITHUB_PAT: ${VITE_GITHUB_PAT}
        VITE_GITHUB_OWNER: ${VITE_GITHUB_OWNER}
        VITE_GITHUB_REPO: ${VITE_GITHUB_REPO}
        VITE_GITHUB_BRANCH: ${VITE_GITHUB_BRANCH:-main}
    restart: unless-stopped
    ports:
      - "${OVERWATCH_PORT:-8080}:80"
