# Portainer / CLI: GHCR + puerto opcional + Traefik (misma convención que n8n).
# Antes del primer deploy: docker network create traefik   (si no existe)
# Opcional: OVERWATCH_IMAGE, OVERWATCH_PORT (default 8080)

version: "3.8"

services:
  overwatch:
    image: ${OVERWATCH_IMAGE:-ghcr.io/thecarhill/overwatch-mission-control:latest}
    container_name: overwatch
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${OVERWATCH_PORT:-8080}:8080"
    volumes:
      - overwatch_data:/data
    environment:
      DATA_DIR: /data
      PORT: "8080"
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_OWNER: ${GITHUB_OWNER:-}
      GITHUB_REPO: ${GITHUB_REPO:-}
      GITHUB_BRANCH: ${GITHUB_BRANCH:-main}
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.services.overwatch.loadbalancer.server.port=8080"
      - "traefik.http.routers.overwatch.rule=Host(`overwatch.carceller.cc`)"
      - "traefik.http.routers.overwatch.entrypoints=websecure"
      - "traefik.http.routers.overwatch.tls=true"
      - "traefik.http.routers.overwatch.tls.certresolver=cloudflare"
      - "traefik.http.routers.overwatch.middlewares=secure-headers@file"
      - "traefik.http.routers.overwatch-http.rule=Host(`overwatch.carceller.cc`)"
      - "traefik.http.routers.overwatch-http.entrypoints=web"
      - "traefik.http.routers.overwatch-http.middlewares=redirect-to-https@file"

volumes:
  overwatch_data:
    driver: local

networks:
  traefik:
    external: true
