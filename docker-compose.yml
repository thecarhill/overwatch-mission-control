# Portainer / despliegue genérico: imagen desde GHCR + puerto publicado.
# (La versión con Traefik + red externa `traefik` está en docker-compose.traefik.yml)

services:
  overwatch:
    image: ghcr.io/thecarhill/overwatch-mission-control:latest
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${OVERWATCH_PORT:-8080}:80"
